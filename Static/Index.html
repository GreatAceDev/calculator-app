<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #334155;
            --accent: #38bdf8;
            --accent-2: #8b5cf6;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --danger: #f87171;
            font-family: Inter, system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 32%),
                        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.18), transparent 28%),
                        var(--bg);
            color: var(--text);
        }

        .calculator {
            width: min(420px, calc(100vw - 2rem));
            border-radius: 32px;
            padding: 2rem;
            background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(30,41,59,0.95));
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.04em;
            margin: 0;
        }

        .display {
            width: 100%;
            min-height: 4.5rem;
            border-radius: 1.5rem;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.16);
            color: var(--text);
            font-size: 2rem;
            text-align: right;
            letter-spacing: 0.02em;
            display: grid;
            place-content: center end;
            word-break: break-all;
        }

        .display .subtext {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .keypad {
            display: grid;
            gap: 0.85rem;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        button {
            border: none;
            border-radius: 18px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            background: rgba(148, 163, 184, 0.08);
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.06);
        }

        button:hover {
            transform: translateY(-1px);
            background: rgba(148, 163, 184, 0.14);
        }

        button:active {
            transform: translateY(0);
            background: rgba(148, 163, 184, 0.2);
        }

        button.operator {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.22), rgba(139, 92, 246, 0.22));
            color: #eff6ff;
        }

        button.clear {
            background: rgba(248, 113, 113, 0.18);
            color: #fecaca;
        }

        button.equals {
            grid-column: span 2;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            color: #0f172a;
        }

        /* Side Panel Styles */
        .side-panel-container {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            display: flex;
            z-index: 1000;
        }

        .side-panel {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.95));
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-right: none;
            padding: 2rem 1.5rem;
            width: 280px;
            height: 100%;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
        }

        .side-panel.active {
            transform: translateX(0);
        }

        .panel-toggle-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 60px;
            height: 60px;
            border-radius: 0 999px 999px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            font-size: 1.65rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            font-weight: 800;
            position: fixed;
            right: 0;
            top: 45%;
            transform: translateY(-50%);
            z-index: 9999;
            box-shadow: -8px 0 24px rgba(0, 0, 0, 0.35);
        }

        .panel-toggle-btn:hover {
            transform: translateY(-50%) scale(1.08);
            box-shadow: -12px 0 28px rgba(0, 0, 0, 0.4);
        }

        .side-panel h2 {
            font-size: 1.3rem;
            margin: 0 0 1.5rem 0;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .social-link:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateX(-4px);
        }

        .social-icon {
            font-size: 1.5rem;
            min-width: 24px;
        }

        .social-text {
            flex: 1;
        }

        @media (max-width: 420px) {
            .calculator {
                padding: 1.25rem;
            }

            .display {
                min-height: 3.5rem;
                font-size: 1.75rem;
            }

            button {
                padding: 0.85rem;
                font-size: 1rem;
            }

            .side-panel {
                width: 240px;
                padding: 1.5rem 1rem;
            }

            .panel-toggle-btn {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="header">
            <div>
                <h1>Modern Calculator</h1>
                <p style="margin: 0.25rem 0 0; color: var(--muted); font-size: 0.95rem;">Powered by FastAPI</p>
            </div>
            <div style="text-align: right; color: var(--muted); font-size: 0.9rem;">API-driven UX</div>
        </div>
        <div class="display" id="display">
            <div class="subtext" id="history">Ready</div>
            <div id="output">0</div>
        </div>
        <div class="keypad">
            <button class="clear" data-key="clear">AC</button>
            <button class="operator" data-key="(">(</button>
            <button class="operator" data-key=")">)</button>
            <button class="operator" data-key="/">÷</button>
            <button data-key="7">7</button>
            <button data-key="8">8</button>
            <button data-key="9">9</button>
            <button class="operator" data-key="*">×</button>
            <button data-key="4">4</button>
            <button data-key="5">5</button>
            <button data-key="6">6</button>
            <button class="operator" data-key="-">−</button>
            <button data-key="1">1</button>
            <button data-key="2">2</button>
            <button data-key="3">3</button>
            <button class="operator" data-key="+">+</button>
            <button data-key="0">0</button>
            <button data-key=".">.</button>
            <button class="operator" data-key="^">^</button>
            <button class="equals" data-key="=">=</button>
        </div>
    </div>

    <!-- Side Panel with Social Links -->
    <div class="side-panel-container">
        <div class="side-panel" id="sidePanel">
            <h2>Follow Me</h2>
            <div class="social-links">
                <a href="https://www.youtube.com/@AceNov-X" target="_blank" rel="noopener noreferrer" class="social-link">
                    <span class="social-icon">▶</span>
                    <span class="social-text">YouTube</span>
                </a>
                <a href="https://discord.com" target="_blank" rel="noopener noreferrer" class="social-link">
                    <span class="social-icon">💬</span>
                    <span class="social-text">Discord</span>
                </a>
            </div>
        </div>
        <button class="panel-toggle-btn" id="panelToggle">‹</button>
    </div>

    <script src="Script.js"></script>
</body>
</html>
